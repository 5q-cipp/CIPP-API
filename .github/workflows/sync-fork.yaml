name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * *' # This runs the action daily at midnight UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v2
        with:
          persist-credentials: false

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/KelvinTegelaar/CIPP-API.git
          git fetch upstream
          git checkout master

      - name: Merge changes from upstream
        run: |
          git merge upstream/master || true

      - name: Check if there are changes to push
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changes=false" >> $GITHUB_ENV
          else
            echo "changes=true" >> $GITHUB_ENV
          fi

      - name: Push changes
        if: env.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/your-username/your-fork.git
          git push origin master

      - name: Display Git config
        run: |
          git config --list

      - name: Debug Git status
        run: |
          git status
          git log -1
